name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -v
